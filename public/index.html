<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>山水八字</title><link rel="stylesheet" href="css/style.css"></head><body><div id="page-input" class="page active"><div class="bg-ink"></div><div class="content"><div class="logo"><div class="logo-icon">山</div><h1>山水八字</h1><p class="subtitle">输入生日，生成你的专属水墨山水壁纸</p></div><form id="bazi-form" class="form"><div class="form-group"><label>出生日期</label><div class="date-inputs"><select id="year" required></select><span>年</span><select id="month" required></select><span>月</span><select id="day" required></select><span>日</span></div></div><div class="form-group"><label>出生时辰</label><div class="hour-section"><select id="hour"><option value="">-- 时辰未知 --</option><option value="0">子时</option><option value="1">丑时</option><option value="2">寅时</option><option value="3">卯时</option><option value="4">辰时</option><option value="5">巳时</option><option value="6">午时</option><option value="7">未时</option><option value="8">申时</option><option value="9">酉时</option><option value="10">戌时</option><option value="11">亥时</option></select></div></div><button type="submit" class="btn-generate"><span>生成山水壁纸</span></button></form><p class="hint">仅供娱乐 · 不做任何预测</p></div></div><div id="page-loading" class="page"><div class="loading-content"><div class="ink-loading"><div class="drop"></div><div class="ripple ripple-1"></div><div class="ripple ripple-2"></div><div class="ripple ripple-3"></div></div><p class="loading-text">正在绘就你的山水...</p><p class="loading-sub">AI水墨生成约需 10-30 秒</p></div></div><div id="page-result" class="page"><div class="result-image-container"><img id="result-image" src="" alt="山水画"><div class="image-overlay"></div></div><button id="btn-info" class="btn-info" title="查看元素说明">?</button><button id="btn-regenerate" class="btn-regenerate" title="重新生成"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path
